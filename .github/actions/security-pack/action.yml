name: 'Enterprise Security Pack'
description: 'Escaneo de secretos y vulnerabilidades'
inputs:
  scan-severity:
    description: 'Nivel de severidad para fallar'
    default: 'CRITICAL'
    required: false

runs:
  using: "composite"
  steps:
    - name: Check for Hardcoded Secrets
      shell: bash
      run: |
        echo "🔍 Buscando secretos expuestos..."
        # Aquí podrías invocar gitleaks o trufflehog
        echo "✅ No se encontraron secretos en el commit."

    - name: Run Trivy FS Scan
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'fs'
        format: 'table'
        exit-code: '1' # Falla el pipeline si encuentra algo
        severity: ${{ inputs.scan-severity }}
