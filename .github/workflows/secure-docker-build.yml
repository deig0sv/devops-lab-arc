name: Secure Docker Build
on: workflow_dispatch

jobs:
  secure-build:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Capture K8s secret for build
        id: secrets
        run: |
          # Capturamos el valor y lo enmascaramos en los logs
          echo "::add-mask::$MY_K8S_TOKEN"
          echo "token=$MY_K8S_TOKEN" >> $GITHUB_OUTPUT

      - name: Build with secret (never exposed in layers)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          secrets: |
            my_token=${{ steps.secrets.outputs.token }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
