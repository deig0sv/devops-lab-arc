name: Secure Pipeline

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Modo debug'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: arc-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Debug Input
        run: |
          echo "Modo debug activo: ${{ github.event.inputs.debug_mode }}"

      - name: Build
        env:
          MY_SECRET: ${{ secrets.MY_SUPER_SECRET }}
        run: |
          echo "Haciendo build..."
